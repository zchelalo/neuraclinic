info:
  name: request-password-reset
  type: grpc
  seq: 4

grpc:
  url: "{{http}}://{{host}}:{{authPort}}"
  method: /auth.v1.AuthService/RequestPasswordReset
  methodType: unary
  protoFilePath: ../../neuraclinic-postman-protos/auth/v1/auth.proto
  metadata:
    - name: accept-language
      value: "{{language}}"
    - name: x-user-id
      value: "{{userId}}"
    - name: x-internal-service-token
      value: "{{internalServiceToken}}"
      disabled: true
  message: |-
    {
      "email": "test@email.com"
    }
  auth: inherit
