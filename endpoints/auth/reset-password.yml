info:
  name: reset-password
  type: grpc
  seq: 6

grpc:
  url: "{{http}}://{{host}}:{{authPort}}"
  method: /auth.v1.AuthService/ResetPassword
  methodType: unary
  protoFilePath: ../../neuraclinic-postman-protos/auth/v1/auth.proto
  metadata:
