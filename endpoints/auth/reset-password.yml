      value: "{{internalServiceToken}}"
      disabled: true
  message: |-
    {
      "reset_token": "9-QNdEPlhFmSXTMIrRYpDyAGeZ-4QLEIejvjB7UYhX4",
      "new_password": "Test1324**"
