info:
  name: sign-out-mobile
  type: http
  seq: 3

http:
  method: POST
  url: "{{http}}://{{host}}:{{gatewayPort}}/api/v1/auth/sign-out"
  headers:
    - name: Content-Type
      value: application/json
    - name: X-Auth-Mode
      value: mobile
    - name: Authorization
      value: Bearer {{gatewayAccessToken}}
  body:
    type: json
    data: |-
      {
        "access_token": "{{gatewayAccessToken}}",
        "refresh_token": "{{gatewayRefreshToken}}"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setVar("gatewayAccessToken", "");
          bru.setVar("gatewayRefreshToken", "");
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
