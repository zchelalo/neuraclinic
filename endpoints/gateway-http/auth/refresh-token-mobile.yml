info:
  name: refresh-token-mobile
  type: http
  seq: 5

http:
  method: POST
  url: "{{http}}://{{host}}:{{gatewayPort}}/api/v1/auth/refresh-token"
  headers:
    - name: Content-Type
      value: application/json
    - name: X-Auth-Mode
      value: mobile
  body:
    type: json
    data: |-
      {
        "refresh_token": "{{gatewayRefreshToken}}"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.body?.data?.access_token) {
          bru.setVar("gatewayAccessToken", res.body.data.access_token);
        }
        if (res.body?.data?.refresh_token) {
          bru.setVar("gatewayRefreshToken", res.body.data.refresh_token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
