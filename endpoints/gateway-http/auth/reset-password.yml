info:
  name: reset-password
  type: http
  seq: 10

http:
  method: POST
  url: "{{http}}://{{host}}:{{gatewayPort}}/api/v1/auth/reset-password"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "reset_token": "{{gatewayResetToken}}",
        "new_password": "Test1324*"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
