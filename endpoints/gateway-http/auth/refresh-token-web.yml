info:
  name: refresh-token-web
  type: http
  seq: 6

http:
  method: POST
  url: "{{http}}://{{host}}:{{gatewayPort}}/api/v1/auth/refresh-token"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "refresh_token": "{{gatewayRefreshToken}}"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
