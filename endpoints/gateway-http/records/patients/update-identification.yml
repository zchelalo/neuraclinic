info:
  name: update-identification
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{http}}://{{host}}:{{gatewayPort}}/api/v1/patients/{{gatewayPatientId}}/identification"
  headers:
    - name: Content-Type
      value: application/json
    - name: X-Auth-Mode
      value: mobile
      disabled: true
    - name: Authorization
      value: Bearer {{gatewayAccessToken}}
      disabled: true
  body:
    type: json
    data: |-
      {
        "occupation": "Psicologia",
        "religion": "Ninguna"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
