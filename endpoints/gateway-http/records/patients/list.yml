info:
  name: list
  type: http
  seq: 2

http:
  method: GET
  url: "{{http}}://{{host}}:{{gatewayPort}}/api/v1/patients?search_query=Eduardo&with_pending_appointments=false&with_no_appointments=false&ever_had_appointments=true"
  headers:
    - name: X-Auth-Mode
      value: mobile
      disabled: true
    - name: Authorization
      value: Bearer {{gatewayAccessToken}}
      disabled: true
  params:
    - name: search_query
      value: Eduardo
      type: query
    - name: with_pending_appointments
      value: "false"
      type: query
    - name: with_no_appointments
      value: "false"
      type: query
    - name: ever_had_appointments
      value: "true"
      type: query

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
