info:
  name: list
  type: http
  seq: 2

http:
  method: GET
  url: "{{http}}://{{host}}:{{gatewayPort}}/api/v1/notes?patient_id={{gatewayPatientId}}&with_appointment_associated=true&with_files_associated=false&search_query=Diagnostico"
  headers:
    - name: X-Auth-Mode
      value: mobile
      disabled: true
    - name: Authorization
      value: Bearer {{gatewayAccessToken}}
      disabled: true
  params:
    - name: patient_id
      value: "{{gatewayPatientId}}"
      type: query
    - name: with_appointment_associated
      value: "true"
      type: query
    - name: with_files_associated
      value: "false"
      type: query
    - name: search_query
      value: Diagnostico
      type: query

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
