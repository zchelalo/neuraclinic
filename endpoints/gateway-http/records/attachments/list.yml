info:
  name: list
  type: http
  seq: 3

http:
  method: GET
  url: "{{http}}://{{host}}:{{gatewayPort}}/api/v1/attachments?patient_id={{gatewayPatientId}}&note_id={{gatewayNoteId}}"
  headers:
    - name: X-Auth-Mode
      value: mobile
      disabled: true
    - name: Authorization
      value: Bearer {{gatewayAccessToken}}
      disabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
