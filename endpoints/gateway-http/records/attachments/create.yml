info:
  name: create
  type: http
  seq: 1

http:
  method: POST
  url: "{{http}}://{{host}}:{{gatewayPort}}/api/v1/attachments"
  headers:
    - name: Content-Type
      value: application/json
    - name: X-Auth-Mode
      value: mobile
      disabled: true
    - name: Authorization
      value: Bearer {{gatewayAccessToken}}
      disabled: true
    - name: Accept-Language
      value: es
      disabled: true
  body:
    type: json
    data: |-
      {
        "patient_id": "{{gatewayPatientId}}",
        "note_id": "{{gatewayNoteId}}",
        "original_name": "architecture.png",
        "mime_type": "image/png",
        "size_bytes": 1909640
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.body?.data?.upload_url) {
          bru.setVar("attachmentUploadUrl", res.body.data.upload_url);
        }
        if (res.body?.data?.id) {
          bru.setVar("attachmentId", res.body.data.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
