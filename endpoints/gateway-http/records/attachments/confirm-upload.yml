info:
  name: confirm-upload
  type: http
  seq: 2

http:
  method: POST
  url: "{{http}}://{{host}}:{{gatewayPort}}/api/v1/attachments/{{attachmentId}}/confirm-upload"
  headers:
    - name: Content-Type
      value: application/json
    - name: X-Auth-Mode
      value: mobile
      disabled: true
    - name: Authorization
      value: Bearer {{gatewayAccessToken}}
      disabled: true
  body:
    type: json
    data: |-
      {
        "status": "FILE_STATUS_AVAILABLE"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
