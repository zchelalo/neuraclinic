info:
  name: find-by-patient-id
  type: http
  seq: 1

http:
  method: GET
  url: "{{http}}://{{host}}:{{gatewayPort}}/api/v1/familiograms/patient/{{gatewayFamiliogramPatientId}}"
  headers:
    - name: X-Auth-Mode
      value: mobile
      disabled: true
    - name: Authorization
      value: Bearer {{gatewayAccessToken}}
      disabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
