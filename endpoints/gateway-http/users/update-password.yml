info:
  name: update-password
  type: http
  seq: 5

http:
  method: PATCH
  url: "{{http}}://{{host}}:{{gatewayPort}}/api/v1/users/{{gatewayUserLookupId}}/password"
  headers:
    - name: Content-Type
      value: application/json
    - name: X-Auth-Mode
      value: mobile
      disabled: true
    - name: Authorization
      value: Bearer {{gatewayAccessToken}}
      disabled: true
  body:
    type: json
    data: |-
      {
        "new_password": "Test1324*"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
