info:
  name: list-countries
  type: http
  seq: 1

http:
  method: GET
  url: "{{http}}://{{host}}:{{gatewayPort}}/api/v1/locations/countries?limit=5&query=mex"
  headers:
    - name: X-Auth-Mode
      value: mobile
      disabled: true
    - name: Authorization
      value: Bearer {{gatewayAccessToken}}
      disabled: true
  params:
    - name: limit
      value: "5"
      type: query
    - name: query
      value: mex
      type: query

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
