info:
  name: search-postal-codes
  type: http
  seq: 5

http:
  method: GET
  url: "{{http}}://{{host}}:{{gatewayPort}}/api/v1/locations/postal-codes/search?country_code=MX&postal_code=44100&limit=5"
  headers:
    - name: X-Auth-Mode
      value: mobile
      disabled: true
    - name: Authorization
      value: Bearer {{gatewayAccessToken}}
      disabled: true
  params:
    - name: country_code
      value: MX
      type: query
    - name: postal_code
      value: "44100"
      type: query
    - name: limit
      value: "5"
      type: query

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
