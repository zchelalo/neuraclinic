info:
  name: list-admin-areas
  type: http
  seq: 2

http:
  method: GET
  url: "{{http}}://{{host}}:{{gatewayPort}}/api/v1/locations/admin-areas?country_code=MX&admin_area_type=ADMIN_AREA_TYPE_STATE&limit=5&query=jali"
  headers:
    - name: X-Auth-Mode
      value: mobile
      disabled: true
    - name: Authorization
      value: Bearer {{gatewayAccessToken}}
      disabled: true
  params:
    - name: country_code
      value: MX
      type: query
    - name: admin_area_type
      value: ADMIN_AREA_TYPE_STATE
      type: query
    - name: limit
      value: "5"
      type: query
    - name: query
      value: jali
      type: query

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
