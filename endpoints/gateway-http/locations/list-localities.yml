info:
  name: list-localities
  type: http
  seq: 3

http:
  method: GET
  url: "{{http}}://{{host}}:{{gatewayPort}}/api/v1/locations/localities?country_code=MX&admin_area_code=14&limit=5&query=guada"
  headers:
    - name: X-Auth-Mode
      value: mobile
      disabled: true
    - name: Authorization
      value: Bearer {{gatewayAccessToken}}
      disabled: true
  params:
    - name: country_code
      value: MX
      type: query
    - name: admin_area_code
      value: "14"
      type: query
    - name: limit
      value: "5"
      type: query
    - name: query
      value: guada
      type: query

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
