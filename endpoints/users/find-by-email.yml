info:
  name: find-by-email
  type: grpc
  seq: 4

grpc:
  url: "{{http}}://{{host}}:{{userPort}}"
  method: /user.v1.UserService/FindByEmail
  methodType: unary
  protoFilePath: ../../neuraclinic-api-client-protos/user/v1/user.proto
  metadata:
    - name: accept-language
      value: "{{language}}"
    - name: x-user-id
      value: "{{userId}}"
    - name: x-internal-service-token
      value: "{{internalServiceToken}}"
  message: |-
    {
      "email": "test@email.com"
    }
  auth: inherit
