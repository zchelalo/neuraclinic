info:
  name: verify-password
  type: grpc
  seq: 5

grpc:
  url: "{{http}}://{{host}}:{{userPort}}"
  method: /user.v1.UserService/VerifyPassword
  methodType: unary
  protoFilePath: ../../neuraclinic-api-client-protos/user/v1/user.proto
  metadata:
    - name: accept-language
      value: "{{language}}"
    - name: x-user-id
      value: "{{userId}}"
      disabled: true
    - name: x-internal-service-token
      value: "{{internalServiceToken}}"
  message: |-
    {
      "email": "test@email.com",
      "password": "Test1324*"
    }
  auth: inherit
